name: Brain — Competitor Monitor

# Weekly: scan brain_chunks for competitor mentions, refresh _Marketing/competitor-intel.md
# Runs Sundays 09:00 IST after the weekly review.

on:
  schedule:
    - cron: '30 3 * * 0'  # 03:30 UTC Sundays = 09:00 IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Run competitor monitor
        env:
          SUPABASE_URL: ${{ secrets.BRAIN_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.BRAIN_SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BRAIN_ANTHROPIC_API_KEY }}
        run: node _Murali-Second-Brain/competitor-monitor.mjs
      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _Marketing/competitor-intel.md
          if git diff --staged --quiet; then
            echo "No intel changes."
          else
            git commit -m "chore(brain): competitor intel refresh"
            git push
          fi
