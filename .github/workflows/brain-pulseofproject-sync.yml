name: Brain — pulseofproject.com Sync

# Pulls bug reports + projects (the "who does what" view) from pulseofproject.com's
# Supabase and ingests them into brain_chunks. Direct ingest, no commit needed.

on:
  schedule:
    - cron: '30 4 * * *'  # 04:30 UTC = 10:00 IST, daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Sync pulseofproject.com bugs + projects
        env:
          SUPABASE_URL: ${{ secrets.BRAIN_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.BRAIN_SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.BRAIN_OPENAI_API_KEY }}
          PULSE_SUPABASE_URL: ${{ secrets.PULSE_SUPABASE_URL }}
          PULSE_SUPABASE_SERVICE_KEY: ${{ secrets.PULSE_SUPABASE_SERVICE_KEY }}
        run: node _Murali-Second-Brain/pulseofproject-sync.mjs
