name: Brain — Slack Thread Sync

# Pulls messages from the designated dev/bug Slack threads into brain_chunks.
# Configure the threads in _Murali-Second-Brain/slack-thread-sync.mjs (THREADS).

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 10:30 IST, daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Sync Slack threads
        env:
          SUPABASE_URL: ${{ secrets.BRAIN_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.BRAIN_SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.BRAIN_OPENAI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.BRAIN_SLACK_BOT_TOKEN }}
        run: node _Murali-Second-Brain/slack-thread-sync.mjs
