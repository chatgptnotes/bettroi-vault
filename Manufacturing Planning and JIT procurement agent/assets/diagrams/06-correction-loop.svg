<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F5B23A"/>
    </marker>
  </defs>

  <g font-size="14" fill="#F0E9DD">
    <!-- Step boxes -->
    <g>
      <rect x="60" y="80" width="220" height="80" rx="10" fill="#1F1B17" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="170" y="115" text-anchor="middle" font-weight="600" font-size="15">1. Agent recommends</text>
      <text x="170" y="138" text-anchor="middle" font-size="12" fill="#A89F90">with skill + lesson citations</text>
    </g>

    <g>
      <rect x="370" y="80" width="220" height="80" rx="10" fill="#1F1B17" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="480" y="115" text-anchor="middle" font-weight="600" font-size="15">2. Planner edits</text>
      <text x="480" y="138" text-anchor="middle" font-size="12" fill="#A89F90">+ types why (mandatory)</text>
    </g>

    <g>
      <rect x="680" y="80" width="220" height="80" rx="10" fill="#1F1B17" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="790" y="115" text-anchor="middle" font-weight="600" font-size="15">3. Correction Note</text>
      <text x="790" y="138" text-anchor="middle" font-size="12" fill="#A89F90">written to Memory Vault</text>
    </g>

    <!-- Reflection cluster -->
    <g>
      <rect x="990" y="80" width="180" height="80" rx="10" fill="#2A2520" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="1080" y="110" text-anchor="middle" font-weight="600" font-size="14">4. Nightly</text>
      <text x="1080" y="130" text-anchor="middle" font-weight="600" font-size="14">reflection</text>
      <text x="1080" y="150" text-anchor="middle" font-size="11" fill="#A89F90">3+ similar → cluster</text>
    </g>

    <!-- Lesson -->
    <g>
      <rect x="680" y="260" width="220" height="80" rx="10" fill="#3A2B0F" stroke="#F5B23A" stroke-width="2"/>
      <text x="790" y="295" text-anchor="middle" font-weight="700" font-size="15" fill="#F5B23A">5. Lesson drafted</text>
      <text x="790" y="318" text-anchor="middle" font-size="12" fill="#E8DAB8">planner promotes → active</text>
    </g>

    <!-- Apply -->
    <g>
      <rect x="370" y="260" width="220" height="80" rx="10" fill="#1F1B17" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="480" y="295" text-anchor="middle" font-weight="600" font-size="15">6. Next decision</text>
      <text x="480" y="318" text-anchor="middle" font-size="12" fill="#A89F90">retrieves the Lesson</text>
    </g>

    <!-- Outcome -->
    <g>
      <rect x="60" y="260" width="220" height="80" rx="10" fill="#1F1B17" stroke="#F5B23A" stroke-width="1.5"/>
      <text x="170" y="295" text-anchor="middle" font-weight="600" font-size="15">7. Mistake not repeated</text>
      <text x="170" y="318" text-anchor="middle" font-size="12" fill="#A89F90">override rate ↓</text>
    </g>

    <!-- Arrows -->
    <line x1="285" y1="120" x2="365" y2="120" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <line x1="595" y1="120" x2="675" y2="120" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <line x1="905" y1="120" x2="985" y2="120" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <line x1="1080" y1="165" x2="1080" y2="220" stroke="#F5B23A" stroke-width="1.5"/>
    <line x1="1080" y1="220" x2="905" y2="290" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <line x1="675" y1="300" x2="595" y2="300" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <line x1="365" y1="300" x2="285" y2="300" stroke="#F5B23A" stroke-width="1.5" marker-end="url(#arrow2)"/>

    <!-- Bottom callout -->
    <text x="600" y="440" text-anchor="middle" font-size="14" font-style="italic" fill="#A89F90">
      Every override becomes a permanent training signal.
    </text>
    <text x="600" y="465" text-anchor="middle" font-size="14" font-style="italic" fill="#A89F90">
      Three similar overrides become a promoted rule.
    </text>
    <text x="600" y="500" text-anchor="middle" font-size="14" font-weight="600" fill="#F5B23A">
      The agent grows without anyone writing code.
    </text>
  </g>
</svg>
