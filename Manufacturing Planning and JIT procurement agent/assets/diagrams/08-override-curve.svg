<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="Inter, system-ui, sans-serif">
  <g font-size="13" fill="#E8DAB8">
    <!-- Axes -->
    <line x1="120" y1="80" x2="120" y2="460" stroke="#A89F90" stroke-width="1.5"/>
    <line x1="120" y1="460" x2="1120" y2="460" stroke="#A89F90" stroke-width="1.5"/>

    <!-- Y axis labels -->
    <text x="100" y="90" text-anchor="end" fill="#E8DAB8">100%</text>
    <text x="100" y="180" text-anchor="end" fill="#E8DAB8">75%</text>
    <text x="100" y="270" text-anchor="end" fill="#E8DAB8">50%</text>
    <text x="100" y="360" text-anchor="end" fill="#E8DAB8">25%</text>
    <text x="100" y="445" text-anchor="end" fill="#E8DAB8">10%</text>

    <!-- X axis labels -->
    <text x="200" y="490" text-anchor="middle" fill="#E8DAB8">Week 1</text>
    <text x="350" y="490" text-anchor="middle" fill="#E8DAB8">Week 4</text>
    <text x="510" y="490" text-anchor="middle" fill="#E8DAB8">Week 8</text>
    <text x="700" y="490" text-anchor="middle" fill="#E8DAB8">Month 3</text>
    <text x="900" y="490" text-anchor="middle" fill="#E8DAB8">Month 6</text>
    <text x="1080" y="490" text-anchor="middle" fill="#E8DAB8">Month 12</text>

    <text x="60" y="270" text-anchor="middle" fill="#A89F90" font-size="12" transform="rotate(-90 60 270)">Planner override rate</text>

    <!-- Gridlines -->
    <line x1="120" y1="180" x2="1120" y2="180" stroke="#3A3530" stroke-dasharray="2 4"/>
    <line x1="120" y1="270" x2="1120" y2="270" stroke="#3A3530" stroke-dasharray="2 4"/>
    <line x1="120" y1="360" x2="1120" y2="360" stroke="#3A3530" stroke-dasharray="2 4"/>

    <!-- Curve -->
    <path d="M 200 90 Q 280 100 350 180 Q 430 250 510 270 Q 600 290 700 360 Q 800 410 900 440 Q 980 450 1080 445"
          fill="none" stroke="#F5B23A" stroke-width="3.5"/>

    <!-- Points -->
    <circle cx="200" cy="90"  r="6" fill="#F5B23A"/>
    <circle cx="350" cy="180" r="6" fill="#F5B23A"/>
    <circle cx="510" cy="270" r="6" fill="#F5B23A"/>
    <circle cx="700" cy="360" r="6" fill="#F5B23A"/>
    <circle cx="900" cy="440" r="6" fill="#F5B23A"/>
    <circle cx="1080" cy="445" r="6" fill="#F5B23A"/>

    <!-- Annotations -->
    <text x="240" y="90"  fill="#F5B23A" font-weight="600">80%</text>
    <text x="385" y="180" fill="#F5B23A" font-weight="600">50%</text>
    <text x="545" y="270" fill="#F5B23A" font-weight="600">40%</text>
    <text x="735" y="360" fill="#F5B23A" font-weight="600">25%</text>
    <text x="935" y="440" fill="#F5B23A" font-weight="600">10%</text>

    <!-- Callout -->
    <text x="700" y="540" text-anchor="middle" font-size="14" font-style="italic" fill="#A89F90">
      By month 6, the agent recommends what your best planner would —
      even when your best planner is on leave.
    </text>
  </g>
</svg>
