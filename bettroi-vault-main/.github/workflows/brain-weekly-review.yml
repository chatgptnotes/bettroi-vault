name: Brain — Weekly Review

# Every Sunday 08:00 IST, generate a comprehensive weekly retrospective.
# Output: _Weekly-Reviews/YYYY-Www.md committed to vault + Slack DM to Murali.

on:
  schedule:
    - cron: '30 2 * * 0'  # 02:30 UTC Sundays = 08:00 IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Generate weekly review
        env:
          SUPABASE_URL: ${{ secrets.BRAIN_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.BRAIN_SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BRAIN_ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.BRAIN_SLACK_BOT_TOKEN }}
          SLACK_MURALI_USER_ID: ${{ secrets.BRAIN_SLACK_MURALI_USER_ID }}
          BNI_SUPABASE_URL: ${{ secrets.BNI_SUPABASE_URL }}
          BNI_SUPABASE_ANON_KEY: ${{ secrets.BNI_SUPABASE_ANON_KEY }}
        run: node _Murali-Second-Brain/weekly-review.mjs
      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "_Weekly-Reviews/*.md"
          if git diff --staged --quiet; then
            echo "No review to commit."
          else
            git commit -m "chore(brain): weekly review"
            git push
          fi
